env:
  type: real
  search_api_key: ${BING_API_KEY}   # read from env var
  search_engine: bing
  headless: true
  request_delay: 1.0

agent:
  model: claude-sonnet-4-6
  max_steps: 15
  max_sub_goals: 6

reward:
  sub_goal_weight: 0.2
  answer_weight: 1.0
  citation_weight: 0.3
  step_penalty: 0.01
  expected_citations: 3
