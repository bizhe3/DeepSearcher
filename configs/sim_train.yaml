env:
  type: sim               # "sim" or "real"
  corpus_dir: data/corpus
  embedding_model: sentence-transformers/all-MiniLM-L6-v2
  top_k: 5

agent:
  model: claude-sonnet-4-6
  max_steps: 20
  max_sub_goals: 6

reward:
  sub_goal_weight: 0.2
  answer_weight: 1.0
  citation_weight: 0.3
  step_penalty: 0.01
  expected_citations: 3

training:
  algorithm: grpo
  batch_size: 8
  learning_rate: 1.0e-5
  max_epochs: 3
